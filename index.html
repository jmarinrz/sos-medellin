<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#A32D2D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOS Medellín">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Sistema de alertas tempranas para gestión del riesgo en Medellín">
<title>SOS Medellín</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #faf9f5;
  color: #1a1a1a;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
}

#app {
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

#screen-content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

button { font-family: inherit; cursor: pointer; }

.risk-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; }
.risk-red { background: #FCEBEB; color: #791F1F; }
.risk-orange { background: #FAECE7; color: #993C1D; }
.risk-yellow { background: #FAEEDA; color: #854F0B; }

.action-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 10px; }

.big-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; border-radius: 12px; border: 0; font-size: 14px; font-weight: 500; width: 100%; }
.btn-emergency { background: #A32D2D; color: #fff; }

.alert-item { padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid; }

.tab-bar {
  background: #fff;
  border-top: 0.5px solid rgba(0,0,0,0.1);
  display: flex;
  justify-content: space-around;
  padding: 8px 0 max(10px, env(safe-area-inset-bottom));
  flex-shrink: 0;
}
.tab-icon { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: #5f5e5a; padding: 4px 8px; border-radius: 6px; }
.tab-icon.active { color: #1a1a1a; }
.tab-icon.active i { color: #A32D2D; }

.section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #5f5e5a; font-weight: 500; margin: 0 0 8px; }

.report-type { display: flex; align-items: center; gap: 8px; padding: 12px; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; font-size: 13px; background: #fff; }
.report-type.selected { border-color: #A32D2D; background: #FCEBEB; color: #791F1F; }

.help-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }

.chat-bubble { padding: 8px 10px; border-radius: 12px; font-size: 12px; max-width: 80%; line-height: 1.4; }
.chat-out { background: #DCF8C6; color: #1a3d0a; align-self: flex-end; border-bottom-right-radius: 4px; }
.chat-in { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }

/* Estado de carga al cambiar de modo */
.fade-in { animation: fadeIn .25s ease-out; }
@keyframes fadeIn { from { opacity: 0.4; } to { opacity: 1; } }

/* Toggle modo sénior flotante */
.senior-fab {
  position: fixed;
  top: calc(env(safe-area-inset-top) + 12px);
  right: 12px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 0.5px solid rgba(0,0,0,0.1);
  border-radius: 999px;
  padding: 6px 10px 6px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  z-index: 100;
  color: #1a1a1a;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.senior-fab.active { background: #A32D2D; color: #fff; }
.toggle-track { width: 28px; height: 16px; background: rgba(0,0,0,0.2); border-radius: 999px; position: relative; }
.senior-fab.active .toggle-track { background: rgba(255,255,255,0.3); }
.toggle-thumb { width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: left .2s; }
.senior-fab.active .toggle-thumb { left: 14px; }

/* Bloquear zoom y selección */
input, button { font-size: 16px; } /* evita zoom en iOS al hacer focus */
</style>
</head>
<body>

<div id="app">
  <button id="senior-toggle" class="senior-fab" aria-label="Activar modo sénior">
    <i class="ti ti-accessible" style="font-size:14px"></i>
    <span>Sénior</span>
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
  </button>

  <div id="screen-content"></div>
  <div id="tab-bar-container"></div>
</div>

<script>

  let currentScreen = 'inicio';
  let seniorMode = false;

  // Cargar preferencia guardada

          <path d="M0,20 Q5,15 10,20 T20,20" stroke="#9CB89A" stroke-width="0.5" fill="none" opacity="0.4"/>
        </pattern>
      </defs>
      <rect width="280" height="${h}" fill="#dde5d3"/>
      <path d="M0,0 L0,${h} L70,${h} L80,${h*0.85} L60,${h*0.6} L75,${h*0.4} L55,${h*0.2} L70,0 Z" fill="#a8c098" opacity="0.85"/>

      <line x1="125" y1="0" x2="125" y2="${h}" stroke="#fff" stroke-width="${compact?1.5:2}" opacity="0.9"/>
      <line x1="155" y1="0" x2="155" y2="${h}" stroke="#fff" stroke-width="${compact?1.5:2}" opacity="0.9"/>
      ${!compact ? `

        <text x="225" y="342" font-size="8" fill="#3B6D11" opacity="0.7">San Javier</text>

      <circle cx="60" cy="${h*0.62}" r="${compact?14:36}" fill="#A32D2D" opacity="0.25"/>

        <g transform="translate(170,${h*0.45})"><rect x="-10" y="-10" width="20" height="20" rx="3" fill="#1D9E75"/><text x="0" y="4" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">+</text></g>

  const mapaMedellinSenior = `

      <path d="M72,220 Q120,250 165,290" stroke="#185FA5" stroke-width="5" stroke-dasharray="6,4" fill="none" stroke-linecap="round"/>
      <g transform="translate(180,295)"><rect x="-18" y="-18" width="36" height="36" rx="6" fill="#1D9E75"/><text x="0" y="7" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">+</text></g>

    </svg>`;

  // ============= TAB BARS =============
  const tabBarStandard = (active) => `
    <div class="tab-bar">
      <div class="tab-icon ${active==='inicio'?'active':''}" data-nav="inicio"><i class="ti ti-home" style="font-size:22px"></i><span>Inicio</span></div>
      <div class="tab-icon ${active==='alertas'?'active':''}" data-nav="alertas"><i class="ti ti-bell" style="font-size:22px"></i><span>Alertas</span></div>
      <div class="tab-icon ${active==='mapa'?'active':''}" data-nav="mapa"><i class="ti ti-map-2" style="font-size:22px"></i><span>Mapa</span></div>
      <div class="tab-icon ${active==='ayuda'?'active':''}" data-nav="ayuda"><i class="ti ti-lifebuoy" style="font-size:22px"></i><span>Ayuda</span></div>
    </div>`;

  const tabBarSenior = (active) => `
    <div class="tab-bar" style="padding:12px 0 max(14px,env(safe-area-inset-bottom))">
      <div class="tab-icon ${active==='inicio'?'active':''}" data-nav="inicio"><i class="ti ti-home" style="font-size:30px"></i><span style="font-size:13px;font-weight:500">Inicio</span></div>
      <div class="tab-icon ${active==='alertas'?'active':''}" data-nav="alertas"><i class="ti ti-bell" style="font-size:30px"></i><span style="font-size:13px;font-weight:500">Alertas</span></div>
      <div class="tab-icon ${active==='mapa'?'active':''}" data-nav="mapa"><i class="ti ti-map-2" style="font-size:30px"></i><span style="font-size:13px;font-weight:500">Mapa</span></div>
      <div class="tab-icon ${active==='ayuda'?'active':''}" data-nav="ayuda"><i class="ti ti-lifebuoy" style="font-size:30px"></i><span style="font-size:13px;font-weight:500">Ayuda</span></div>
    </div>`;

  // ============= MODO ESTÁNDAR =============
  const standardInicio = `
    <div style="padding:60px 16px 20px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <div style="width:36px;height:36px;border-radius:10px;background:#A32D2D;display:flex;align-items:center;justify-content:center"><i class="ti ti-shield-check" style="color:#fff;font-size:20px"></i></div>
        <div><p style="margin:0;font-size:15px;font-weight:600">SOS Medellín</p><p style="margin:0;font-size:12px;color:#5f5e5a">Comuna 8 · Villa Hermosa</p></div>
      </div>
      <div style="background:#FAEEDA;border-radius:14px;padding:16px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
          <p class="section-title" style="color:#854F0B;margin:0">Estado de tu zona</p>
          <span style="font-size:11px;color:#854F0B">Hace 5 min</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="width:14px;height:14px;border-radius:50%;background:#EF9F27;box-shadow:0 0 0 4px rgba(239,159,39,.2)"></div>
          <p style="margin:0;font-size:20px;font-weight:600;color:#633806">Riesgo medio</p>
        </div>
        <p style="margin:0;font-size:13px;color:#854F0B;line-height:1.5">Lluvias persistentes en la zona oriental. Mantente atento y evita laderas.</p>
        <div style="display:flex;gap:12px;margin-top:10px;font-size:12px;color:#854F0B">
          <span><i class="ti ti-cloud-rain" style="font-size:14px;vertical-align:-2px"></i> 18 mm/h</span>
          <span><i class="ti ti-temperature" style="font-size:14px;vertical-align:-2px"></i> 21°C</span>
          <span><i class="ti ti-wind" style="font-size:14px;vertical-align:-2px"></i> 12 km/h</span>
        </div>
      </div>
      <button class="big-btn btn-emergency" style="margin-bottom:12px;font-size:17px;padding:18px" data-nav="reportar">
        <i class="ti ti-alert-triangle" style="font-size:24px"></i> Reportar riesgo
      </button>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div class="action-card" data-nav="alertas">
          <div style="width:36px;height:36px;border-radius:10px;background:#FCEBEB;display:flex;align-items:center;justify-content:center"><i class="ti ti-bell-ringing" style="color:#A32D2D;font-size:18px"></i></div>
          <div><p style="margin:0;font-size:13px;font-weight:600">Alertas</p><p style="margin:0;font-size:11px;color:#5f5e5a">3 activas</p></div>
        </div>
        <div class="action-card" data-nav="mapa">
          <div style="width:36px;height:36px;border-radius:10px;background:#E6F1FB;display:flex;align-items:center;justify-content:center"><i class="ti ti-map-2" style="color:#185FA5;font-size:18px"></i></div>
          <div><p style="margin:0;font-size:13px;font-weight:600">Mapa</p><p style="margin:0;font-size:11px;color:#5f5e5a">Ver zona</p></div>
        </div>
      </div>
      <p class="section-title">Comunidad cercana</p>
      <div style="background:#fff;border-radius:10px;border:0.5px solid rgba(0,0,0,0.1);padding:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <i class="ti ti-users" style="font-size:14px;color:#5f5e5a"></i>
          <span style="font-size:12px;color:#5f5e5a">12 vecinos conectados</span>
        </div>
        <p style="margin:0;font-size:13px;line-height:1.5">"Vi grietas nuevas en la cra 49. Tengan cuidado al pasar." — María L.</p>

  const standardAlertas = `
    <div style="padding:60px 16px 20px;">
      <div style="margin-bottom:14px">
        <p style="margin:0;font-size:18px;font-weight:600">Alertas activas</p>

      <div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto">

          <span style="font-size:11px;color:#791F1F">14:32</span>
        </div>
        <p style="margin:0 0 4px;font-size:14px;font-weight:600;color:#501313">Riesgo alto de deslizamiento</p>

          <span style="font-size:11px;color:#993C1D">13:05</span>
        </div>
        <p style="margin:0 0 4px;font-size:14px;font-weight:600;color:#4A1B0C">Inundación en San Javier</p>
        <p style="margin:0;font-size:12px;color:#993C1D;line-height:1.5">Comuna 13. Quebrada La Iguaná desbordada.</p>
      </div>
      <div class="alert-item" style="background:#FAEEDA;border-color:#BA7517">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:11px;font-weight:600;color:#854F0B;text-transform:uppercase;letter-spacing:.4px">Aviso · Atención</span>
          <span style="font-size:11px;color:#854F0B">11:48</span>
        </div>
        <p style="margin:0 0 4px;font-size:14px;font-weight:600;color:#412402">Lluvias intensas próximas 6h</p>

      <button style="width:100%;padding:20px;background:#fff;border:2px solid #888780;border-radius:16px;display:flex;align-items:center;gap:16px">
        <div style="width:56px;height:56px;border-radius:12px;background:#E6F1FB;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i class="ti ti-droplet" style="color:#185FA5;font-size:32px"></i>
        </div>
        <div style="flex:1;text-align:left"><p style="margin:0;font-size:20px;font-weight:600">Hay inundación</p><p style="margin:2px 0 0;font-size:15px;color:#5f5e5a">Guía con dibujos</p></div>
        <i class="ti ti-chevron-right" style="font-size:28px;color:#888780"></i>
      </button>
    </div>`;

  const screens = {
    standard: { inicio: standardInicio, alertas: standardAlertas, mapa: standardMapa, reportar: standardReportar, ayuda: standardAyuda },
    senior:   { inicio: seniorInicio,   alertas: seniorAlertas,   mapa: seniorMapa,   reportar: seniorReportar,   ayuda: seniorAyuda }
  };

  function render(){
    const mode = seniorMode ? 'senior' : 'standard';
    const screenContent = document.getElementById('screen-content');
    screenContent.innerHTML = screens[mode][currentScreen];
    screenContent.classList.remove('fade-in');
    void screenContent.offsetWidth;
    screenContent.classList.add('fade-in');

    const tabBar = seniorMode ? tabBarSenior(currentScreen) : tabBarStandard(currentScreen);
    document.getElementById('tab-bar-container').innerHTML = tabBar;

    document.querySelectorAll('[data-nav]').forEach(el => {
      el.addEventListener('click', () => {
        currentScreen = el.dataset.nav;
        render();
      });
    });
  }

  function toggleSenior(){
    seniorMode = !seniorMode;
    try { localStorage.setItem('seniorMode', seniorMode); } catch(e){}
    const btn = document.getElementById('senior-toggle');
    if (seniorMode) btn.classList.add('active');
    else btn.classList.remove('active');
    render();
  }

  // Inicializar
  if (seniorMode) document.getElementById('senior-toggle').classList.add('active');
  document.getElementById('senior-toggle').addEventListener('click', toggleSenior);
  render();

  // Registrar service worker para PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
})();
</script>
</body>
</html>
